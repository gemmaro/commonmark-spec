[po_directory] po
[po4a_alias:Markdown] CommonMark opt:"--option skip_code_block --option neverwrap"

[type:Yaml] refs.translatable.yaml \
            $lang:refs.translatable.ja.yaml \
            opt:"--option keys=ja"
[type:Markdown] spec.txt $lang:$lang/spec.txt opt:"--option yaml_metadata" add_ja:credit.md
[type:Markdown] ../README.md $lang:$lang/README.md opt:"--keep 28"
[type:Xhtml] ../tools/template.html $lang:$lang/tools/template.html opt:"--keep 42"
